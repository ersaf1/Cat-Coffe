<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Caffe &#8212; Register</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@200..900&family=Inter:wght@300..700&display=swap');

    :root {
      --bg-dark: #2C1B18;
      --bg-cream: #FAF3E0;
      --card-bg: #F5E6CA;
      --accent-caramel: #C69C6D;
      --accent-honey: #D4A373;
      --accent-sage: #A3B18A;
      --text-dark: #1B1B1B;
      --text-muted: #6D6D6D;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(rgba(245, 230, 202, 0.05) 2px, transparent 2px);
      background-size: 30px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeSlideUp 0.6s ease-out forwards;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--card-bg);
      margin-bottom: 8px;
    }
    
    .auth-logo svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-caramel);
    }

    .auth-subtitle {
      color: var(--accent-honey);
      font-size: 0.95rem;
      margin: 0;
    }

    .auth-card {
      background-color: var(--card-bg);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .form-row {
      margin-bottom: 20px;
    }

    .form-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background-color: var(--bg-cream);
      border: 2px solid transparent;
      padding: 14px 16px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .form-input::placeholder {
      color: #A0A0A0;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent-caramel);
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(198, 156, 109, 0.15);
    }
    
    .form-input.input-error {
      border-color: #E76F51;
    }

    .pwd-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.3s;
    }

    .pwd-toggle:hover {
      color: var(--text-dark);
    }

    .auth-btn {
      width: 100%;
      background-color: var(--accent-caramel);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .auth-btn:hover {
      background-color: var(--accent-honey);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(198, 156, 109, 0.3);
    }

    .auth-btn:active {
      transform: translateY(0);
    }
    
    .auth-btn:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent-caramel);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .auth-footer a:hover {
      color: var(--text-dark);
    }

    .error-msg {
      color: #E76F51;
      font-size: 0.8rem;
      margin-top: 6px;
      display: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    .alert-error {
      background-color: rgba(231, 111, 81, 0.1);
      color: #E76F51;
      border: 1px solid rgba(231, 111, 81, 0.2);
    }

    .alert-success {
      background-color: rgba(163, 177, 138, 0.15);
      color: #5C7043;
      border: 1px solid rgba(163, 177, 138, 0.3);
    }
    
    .paw-icon {
      position: absolute;
      bottom: -15px;
      right: -10px;
      width: 80px;
      height: 80px;
      opacity: 0.05;
      pointer-events: none;
      fill: var(--bg-dark);
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-header">
      <div class="auth-logo">
        Cat Caffe 
        <svg viewBox="0 0 24 24"><path d="M12 18c-2.21 0-4-1.79-4-4 0-1.66.68-3.21 1.76-4.24C10.83 8.72 11.4 8.5 12 8.5s1.17.22 1.76.76C14.84 10.29 15.52 11.34 15.52 14c0 2.21-1.57 4-3.52 4zM7.5 12.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z M16.5 12.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"></path><path d="M9 7.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z M15 7.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"></path></svg>
      </div>
      <p class="auth-subtitle">Join the coziest coffee experience</p>
    </div>

    <div class="auth-card">
      <div id="mainAlert" class="alert"></div>

      <form id="registerForm">
        <div class="form-row">
          <label class="form-label" for="fullName">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="fullName" class="form-input" placeholder="John Doe" required>
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="email">Email / Username</label>
          <div class="input-wrapper">
            <input type="text" id="email" class="form-input" placeholder="hello@example.com" required>
          </div>
          <span id="emailError" class="error-msg" style="display: none;">Username is required</span>
        </div>

        <div class="form-row">
          <label class="form-label" for="phone">Phone Number (Optional)</label>
          <div class="input-wrapper">
            <input type="tel" id="phone" class="form-input" placeholder="+62 812 3456 7890">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
            <button type="button" class="pwd-toggle" onclick="togglePwd('password')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <span id="pwdError" class="error-msg" style="display: none;">Must be at least 6 characters</span>
        </div>

        <div class="form-row">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
            <button type="button" class="pwd-toggle" onclick="togglePwd('confirmPassword')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <span id="confirmError" class="error-msg" style="display: none;">Passwords do not match</span>
        </div>

        <button type="submit" id="submitBtn" class="auth-btn">
          <span>Create Account</span>
          <div class="loading-spinner" id="spinner"></div>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
        <br><br>
        <a href="index.html" style="font-size: 0.8rem; color: var(--text-muted);">← Back to Menu</a>
      </div>

      <!-- Decorative subtle paw -->
      <svg class="paw-icon" viewBox="0 0 24 24"><path d="M12 18c-2.21 0-4-1.79-4-4 0-1.66.68-3.21 1.76-4.24C10.83 8.72 11.4 8.5 12 8.5s1.17.22 1.76.76C14.84 10.29 15.52 11.34 15.52 14c0 2.21-1.57 4-3.52 4zM7.5 12.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z M16.5 12.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"></path><path d="M9 7.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z M15 7.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"></path></svg>
    </div>
  </div>

  <script type="module" src="/register.ts"></script>
</body>
</html>
